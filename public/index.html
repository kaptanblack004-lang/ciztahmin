<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>🎨 ÇizTahmin</title>

  <!-- PWA -->
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#ff6b6b">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="ÇizTahmin">
  <meta name="application-name" content="ÇizTahmin">
  <meta name="msapplication-TileColor" content="#1a1a2e">
  <meta name="msapplication-TileImage" content="/icons/icon-144x144.png">

  <!-- SEO & Paylaşım -->
  <meta name="description" content="Arkadaşlarınla çiz, tahmin et ve kazan! Ücretsiz çoklu oyuncu oyunu.">
  <meta property="og:title" content="ÇizTahmin - Çiz ve Tahmin Et">
  <meta property="og:description" content="Arkadaşlarınla çiz, tahmin et ve kazan!">
  <meta property="og:type" content="website">
  <meta property="og:image" content="/icons/icon-512x512.png">

  <!-- İkonlar -->
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="/icons/icon-32x32.png">
  <link rel="apple-touch-icon" href="/icons/icon-192x192.png">
  <link rel="apple-touch-icon" sizes="152x152" href="/icons/icon-152x152.png">
  <link rel="apple-touch-icon" sizes="192x192" href="/icons/icon-192x192.png">

  <!-- Splash screen rengi iOS için -->
  <meta name="apple-mobile-web-app-status-bar-style" content="black">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ── ANA MENÜ ── -->
  <div id="screen-menu" class="screen active">
    <div class="menu-bg">
      <div class="bubble b1"></div>
      <div class="bubble b2"></div>
      <div class="bubble b3"></div>
    </div>
    <div class="menu-card">
      <h1 class="logo">🎨 ÇizTahmin</h1>
      <p class="tagline">Çiz, tahmin et, kazan!</p>
      <input id="input-name" type="text" placeholder="Adını gir..." maxlength="20">
      <button class="btn btn-primary" id="btn-play">Hemen Oyna 🚀</button>
      <div class="divider"><span>veya</span></div>
      <button class="btn btn-secondary" id="btn-create-private">Özel Oda Oluştur 🔒</button>
      <div class="join-private">
        <input id="input-room-code" type="text" placeholder="Oda kodu..." maxlength="6">
        <button class="btn btn-outline" id="btn-join-private">Katıl</button>
      </div>
      <button class="btn btn-install" id="btn-install" style="display:none">
        📲 Uygulamayı Kur
      </button>
    </div>
  </div>

  <!-- ── OYUN ── -->
  <div id="screen-game" class="screen">
    <div id="game-layout">

      <!-- Sol: Oyuncular -->
      <aside id="sidebar-players">
        <div class="sidebar-title">👥 Oyuncular</div>
        <ul id="player-list"></ul>
        <div id="room-info"></div>
      </aside>

      <!-- Orta: Tuval -->
      <main id="game-center">
        <div id="game-header">
          <div id="game-round-info">Tur: <span id="round-display">-</span></div>
          <div id="word-display">
            <span id="word-hint"></span>
          </div>
          <div id="timer-wrap">
            <div id="timer-bar"></div>
            <span id="timer-text">80</span>
          </div>
        </div>

        <div id="canvas-container">
          <canvas id="game-canvas" width="800" height="500"></canvas>
          <div id="canvas-overlay" class="hidden">
            <div id="overlay-content"></div>
          </div>
        </div>

        <!-- Araç çubuğu (sadece çizere görünür) -->
        <div id="toolbar" class="hidden">
          <div class="tool-group">
            <button class="tool-btn active" data-tool="pen" title="Kalem">✏️</button>
            <button class="tool-btn" data-tool="eraser" title="Silgi">⬜</button>
            <button class="tool-btn" data-tool="fill" title="Doldur">🪣</button>
          </div>
          <div class="tool-group colors">
            <!-- Renkler JS ile eklenir -->
          </div>
          <div class="tool-group sizes">
            <button class="size-btn" data-size="3">S</button>
            <button class="size-btn active" data-size="8">M</button>
            <button class="size-btn" data-size="16">L</button>
            <button class="size-btn" data-size="28">XL</button>
          </div>
          <button id="btn-clear" class="btn btn-danger-sm">🗑️ Temizle</button>
        </div>
      </main>

      <!-- Sağ: Sohbet -->
      <aside id="sidebar-chat">
        <div class="sidebar-title">💬 Tahminler</div>
        <div id="chat-messages"></div>
        <div id="chat-input-area">
          <input id="chat-input" type="text" placeholder="Tahmin yaz..." maxlength="60" autocomplete="off">
          <button id="btn-send">→</button>
        </div>
      </aside>
    </div>

    <!-- Kelime Seçim Modalı -->
    <div id="modal-word-choose" class="modal hidden">
      <div class="modal-box">
        <h2>🖌️ Hangi kelimeyi çizmek istersin?</h2>
        <div id="word-choices"></div>
      </div>
    </div>

    <!-- Oyun Sonu Modalı -->
    <div id="modal-game-over" class="modal hidden">
      <div class="modal-box">
        <h2>🏆 Oyun Bitti!</h2>
        <div id="final-scores"></div>
        <div class="gameover-buttons">
          <button class="btn btn-primary" id="btn-play-again">🔄 Tekrar Oyna</button>
          <button class="btn btn-outline-dark" id="btn-back-menu">🏠 Ana Menü</button>
        </div>
        <div class="gameover-countdown-wrap">
          <span>Otomatik yeniden başlıyor: </span>
          <span id="gameover-countdown">12</span>s
        </div>
      </div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="game.js"></script>
</body>
</html>
